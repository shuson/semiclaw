<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Semiclaw Mark</title>
  <desc id="desc">A half-paw and one-handed claw icon for Semiclaw.</desc>

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1B2B"/>
      <stop offset="100%" stop-color="#173A5E"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" fill="#EAF3FB"/>

  <!-- Half paw (left) -->
  <ellipse cx="84" cy="150" rx="38" ry="34" fill="url(#g)"/>
  <circle cx="55" cy="103" r="14" fill="url(#g)"/>
  <circle cx="83" cy="88" r="13" fill="url(#g)"/>
  <circle cx="112" cy="102" r="14" fill="url(#g)"/>

  <!-- One-handed claw marks (right) -->
  <path d="M150 66 C176 92, 176 120, 154 180" fill="none" stroke="#0D2741" stroke-width="12" stroke-linecap="round"/>
  <path d="M182 58 C206 86, 206 116, 184 188" fill="none" stroke="#0D2741" stroke-width="12" stroke-linecap="round"/>
  <path d="M214 66 C236 96, 236 126, 214 198" fill="none" stroke="#0D2741" stroke-width="12" stroke-linecap="round"/>
</svg>
